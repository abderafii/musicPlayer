<!DOCTYPE html>
<html>
<head>
    <title>Music Player</title>
</head>
<body>
    <h1>Music Player</h1>

    <audio id="player" controls style="width: 400px;"></audio>
    <ul id="songList"></ul>

    <script>
        fetch('/songs')
            .then(res => res.json())
            .then(songs => {
                const list = document.getElementById('songList');
                const player = document.getElementById('player');

                songs.forEach(song => {
                    const li = document.createElement('li');
                    li.textContent = song;
                    li.style.cursor = 'pointer';

                    li.onclick = () => {
                        player.src = '/songs/' + encodeURIComponent(song);
                        player.play();
                    };

                    list.appendChild(li);
                });
            });
    </script>
</body>
</html>
